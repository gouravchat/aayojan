services:
  - type: web
    name: aayojan-api
    runtime: python
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: CORS_ORIGINS
        value: https://aayojan.online,https://www.aayojan.online,https://aayojanv1.github.io,https://gouravchat.github.io,http://localhost:5173
      - key: PYTHON_VERSION
        value: "3.12"
